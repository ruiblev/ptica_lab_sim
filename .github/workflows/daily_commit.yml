name: Daily Keep-Alive Commit

on:
  schedule:
    - cron: '0 0 * * *' # Every 24 hours at 00:00 UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Update daily log
        run: |
          date > daily_heartbeat.txt
          echo "Last daily check: $(date)" >> history.log
          tail -n 100 history.log > history.log.tmp && mv history.log.tmp history.log

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add daily_heartbeat.txt history.log
          git commit -m "chore: daily heartbeat [$(date)]" || echo "No changes to commit"
          git push
